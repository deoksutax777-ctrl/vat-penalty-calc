<script type="text/babel">
const { useState, useMemo, Fragment, useRef, useEffect } = React;
const fmt = (n) => { if(n===null||n===undefined||n==="") return ""; if(n===0) return "0"; return Number(n).toLocaleString("ko-KR"); };
const parse = (s) => Number(String(s).replace(/,/g,"")) || 0;
const fmtD = (n) => n < 0 ? "△"+fmt(Math.abs(n)) : fmt(n);

/* ═══ DATE HELPERS ═══ */
const PERIODS = [
  { key:"1p", label:"1기 예정 (1~3월)", dl:(y)=>`${y}-04-25` },
  { key:"1c", label:"1기 확정 (1~6월)", dl:(y)=>`${y}-07-25` },
  { key:"2p", label:"2기 예정 (7~9월)", dl:(y)=>`${y}-10-25` },
  { key:"2c", label:"2기 확정 (7~12월)", dl:(y)=>`${parseInt(y)+1}-01-25` },
];
const daysBetween = (d1s, d2s) => {
  if(!d1s||!d2s) return 0;
  const a=new Date(d1s), b=new Date(d2s);
  if(isNaN(a)||isNaN(b)) return 0;
  return Math.max(0, Math.ceil((b-a)/(1000*60*60*24)));
};
const fmtDate = (ds) => {
  if(!ds) return "-";
  const d=new Date(ds);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
};

/* ═══ 감면율 ═══ */
const getAmendedReduction = (days) => {
  if(days<=0) return 0;
  if(days<=30) return 90; if(days<=90) return 75; if(days<=180) return 50;
  if(days<=365) return 30; if(days<=547) return 20; if(days<=730) return 10;
  return 0;
};
const getLateFilingReduction = (days) => {
  if(days<=0) return 0;
  if(days<=30) return 50; if(days<=90) return 30; if(days<=180) return 20;
  return 0;
};
const AMENDED_TIERS = [
  {label:"~1개월",days:30,rate:90},{label:"1~3개월",days:90,rate:75},{label:"3~6개월",days:180,rate:50},
  {label:"6개월~1년",days:365,rate:30},{label:"1년~1년6월",days:547,rate:20},{label:"1년6월~2년",days:730,rate:10},
];
const LATE_TIERS = [
  {label:"~1개월",days:30,rate:50},{label:"1~3개월",days:90,rate:30},{label:"3~6개월",days:180,rate:20},
];

/* ═══ 세금계산서 유형 (사유 포함) ═══ */
const INV_TYPES = [
  {key:"notIssued",label:"미발급",rate:2,desc:"확정신고기한이 지난 후 발급하거나 미발급한 경우"},
  {key:"lateIssued",label:"지연발급",rate:1,desc:"공급시기가 속하는 과세기간의 확정신고기한까지 발급한 경우"},
  {key:"fake",label:"가공(위장) 발급",rate:2,desc:"실물거래 없이 허위로 세금계산서를 발급한 경우"},
  {key:"fakeRcv",label:"가공(위장) 수취",rate:3,desc:"실물거래 없이 허위 세금계산서를 수취한 경우"},
  {key:"noTransmit",label:"전자세금계산서 미전송",rate:0.5,desc:"전자세금계산서 발급일의 다음날까지 국세청에 전송하지 않은 경우"},
  {key:"lateTransmit",label:"전자세금계산서 지연전송",rate:0.3,desc:"발급일 다음날 경과 후 확정신고기한 내 전송한 경우"},
  {key:"noSummary",label:"합계표 미제출·부실기재",rate:0.5,desc:"매출·매입처별 세금계산서합계표 미제출 또는 사업자등록번호·공급가액 부실기재"},
];

/* ═══ THEMES ═══ */
const THEMES = {
  green:{
    name:"🌿 그린",bg:"#f2f7f2",cardBg:"#fff",cardBdr:"#c8dcc8",cardHBg:"#f5faf5",
    primary:"#2e7d32",primaryGrad:"linear-gradient(135deg,#388e3c,#66bb6a)",
    accent:"#2e7d32",accentLight:"#e8f5e9",text:"#2d3a2d",textLight:"#6b8a6b",hint:"#4a7a4a",
    inputBdr:"#c8dcc8",inputFocusBdr:"#4caf50",inputFocusBg:"#f1f8f1",inputFocusShadow:"rgba(76,175,80,.12)",
    tabActiveTxt:"#2e7d32",tabInactiveTxt:"rgba(255,255,255,.9)",tabBg:"#388e3c",
    bottomTabBg:"#fff",bottomTabBdr:"#c8dcc8",bottomTabActive:"#2e7d32",bottomTabInactive:"#8aaa8a",
    badgeBg:"#e53935",navSecBg:"#e8f5e9",navSecTxt:"#2e7d32",
    resultGood:"#1b5e20",resultBad:"#c62828",resultWarn:"#e65100",resultBlue:"#1565c0",

  },
  white:{
    name:"⚪ 화이트",bg:"#f7f7f7",cardBg:"#fff",cardBdr:"#e0e0e0",cardHBg:"#fafafa",
    primary:"#333",primaryGrad:"linear-gradient(135deg,#444,#666)",
    accent:"#555",accentLight:"#f5f5f5",text:"#222",textLight:"#888",hint:"#999",
    inputBdr:"#ddd",inputFocusBdr:"#333",inputFocusBg:"#f8f8f8",inputFocusShadow:"rgba(0,0,0,.08)",
    tabActiveTxt:"#333",tabInactiveTxt:"rgba(255,255,255,.85)",tabBg:"#444",
    bottomTabBg:"#fff",bottomTabBdr:"#e0e0e0",bottomTabActive:"#333",bottomTabInactive:"#aaa",
    badgeBg:"#e53935",navSecBg:"#eee",navSecTxt:"#555",
    resultGood:"#2e7d32",resultBad:"#c62828",resultWarn:"#e65100",resultBlue:"#1565c0",
    formulaBg:"#fafafa",formulaBdr:"#e0e0e0",formulaAccent:"#333",
    summaryBg:"#f5f5f5",summaryBdr:"#ddd",warnBg:"#fff8e1",warnBdr:"#ffe082",warnTxt:"#e65100",
    okBg:"#e8f5e9",okBdr:"#a5d6a7",okTxt:"#2e7d32",rowBdr:"#eee",tierBg:"#fafafa",tierActiveBg:"#e0e0e0",showKitty:false,
  },
  kitty:{
    name:"🎀 키티",bg:"#fff5f7",cardBg:"#fff",cardBdr:"#f0c4d0",cardHBg:"#fef7f9",
    primary:"#e8567a",primaryGrad:"linear-gradient(135deg,#e8567a,#f0849a)",
    accent:"#c0506a",accentLight:"#fff0f3",text:"#4a3548",textLight:"#a0849a",hint:"#c0506a",
    inputBdr:"#f0c4d0",inputFocusBdr:"#e8567a",inputFocusBg:"#fff0f3",inputFocusShadow:"rgba(232,86,122,.12)",
    tabActiveTxt:"#c0506a",tabInactiveTxt:"rgba(255,255,255,.9)",tabBg:"#e8567a",
    bottomTabBg:"#fff",bottomTabBdr:"#f0c4d0",bottomTabActive:"#e8567a",bottomTabInactive:"#a0849a",
    badgeBg:"#e8567a",navSecBg:"#fce4ec",navSecTxt:"#c0506a",
    resultGood:"#276749",resultBad:"#d63384",resultWarn:"#e65100",resultBlue:"#1565c0",
    formulaBg:"#fef7f9",formulaBdr:"#f0c4d0",formulaAccent:"#c0506a",
    summaryBg:"#fff0f3",summaryBdr:"#f0c4d0",warnBg:"#fff8e1",warnBdr:"#ffe082",warnTxt:"#e65100",
    okBg:"#e8f5e9",okBdr:"#a5d6a7",okTxt:"#2e7d32",rowBdr:"#fce4ec",tierBg:"#fef7f9",tierActiveBg:"#fce4ec",showKitty:true,
  },
};
const KittyFace=({size=40,style:st,color="#e8567a"})=>(<svg width={size} height={size} viewBox="0 0 120 120" style={st}><ellipse cx="60" cy="68" rx="40" ry="35" fill="#fff" stroke="#555" strokeWidth="1.8"/><path d="M24,48 L16,12 L42,36 Z" fill="#fff" stroke="#555" strokeWidth="1.8" strokeLinejoin="round"/><path d="M96,48 L104,12 L78,36 Z" fill="#fff" stroke="#555" strokeWidth="1.8" strokeLinejoin="round"/><ellipse cx="44" cy="62" rx="4" ry="5" fill="#333"/><ellipse cx="76" cy="62" rx="4" ry="5" fill="#333"/><ellipse cx="60" cy="72" rx="3" ry="2.2" fill="#f7c948"/><line x1="8" y1="58" x2="36" y2="64" stroke="#555" strokeWidth="1.2"/><line x1="8" y1="68" x2="36" y2="68" stroke="#555" strokeWidth="1.2"/><line x1="112" y1="58" x2="84" y2="64" stroke="#555" strokeWidth="1.2"/><line x1="112" y1="68" x2="84" y2="68" stroke="#555" strokeWidth="1.2"/></svg>);
const KittyMini=({size=24,style:st,color="#e8567a"})=>(<svg width={size} height={size} viewBox="0 0 120 120" style={{...st,display:"inline-block",verticalAlign:"middle",flexShrink:0}}><ellipse cx="60" cy="68" rx="40" ry="35" fill="#fff" stroke={color} strokeWidth="3"/><path d="M24,48 L16,12 L42,36 Z" fill="#fff" stroke={color} strokeWidth="3" strokeLinejoin="round"/><path d="M96,48 L104,12 L78,36 Z" fill="#fff" stroke={color} strokeWidth="3" strokeLinejoin="round"/><ellipse cx="44" cy="62" rx="5" ry="6" fill="#444"/><ellipse cx="76" cy="62" rx="5" ry="6" fill="#444"/><ellipse cx="60" cy="72" rx="3.5" ry="2.5" fill="#f7c948"/></svg>);

/* ═══ COMPONENTS ═══ */
const NumberInput = ({ value, onChange, placeholder="0", label, hint, t, disabled, badge }) => {
  const [focused, setFocused] = useState(false);
  const display = focused ? (value===0?"":String(value)) : fmt(value);
  return (<div className="field">{label&&<label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"flex",alignItems:"center",gap:6,lineHeight:1.4}}>{label}{badge&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:t.accent,color:"#fff",fontWeight:600}}>{badge}</span>}</label>}<input type="text" inputMode="numeric" value={display} placeholder={placeholder} disabled={disabled} style={{width:"100%",padding:"10px 12px",border:"1px solid "+(focused?t.inputFocusBdr:t.inputBdr),borderRadius:10,fontSize:16,background:disabled?t.accentLight:focused?t.inputFocusBg:"#fff",outline:"none",boxSizing:"border-box",textAlign:"right",fontVariantNumeric:"tabular-nums",boxShadow:focused?"0 0 0 3px "+t.inputFocusShadow:"none",opacity:disabled?.7:1}} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} onChange={(e)=>onChange(parse(e.target.value))} />{hint&&<div style={{fontSize:11.5,color:t.hint,marginTop:3,paddingLeft:2,lineHeight:1.4}}>{hint}</div>}</div>);
};
const ReadonlyField = ({ label, value, sub, t, color }) => (<div className="field"><label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>{label}</label><div style={{padding:"10px 12px",background:t.accentLight,borderRadius:10,textAlign:"right",fontSize:16,fontWeight:700,fontVariantNumeric:"tabular-nums",color:color||(typeof value==="number"&&value<0?t.resultBad:t.accent),border:"1px solid "+t.cardBdr}}>{typeof value==="string"?value:fmtD(value)}</div>{sub&&<div style={{fontSize:11.5,color:t.textLight,marginTop:3,paddingLeft:2}}>{sub}</div>}</div>);

const FormulaBox = ({ lines, result, resultLabel, t }) => (
  <div className="formula-box" style={{background:t.formulaBg,border:"1.5px solid "+t.formulaBdr}}>
    {lines.map((l,i)=><div key={i} className="formula-line" style={{color:t.text}}>{l}</div>)}
    {result!==undefined&&<div className="formula-result" style={{color:t.formulaAccent,borderTop:"1px dashed "+t.formulaBdr,paddingTop:8,marginTop:6}}>
      {resultLabel||"="} <span style={{fontSize:22}}>{typeof result==="string"?result:fmt(result)}</span>원
    </div>}
  </div>
);

const TABS = [
  {key:"info",label:"기본정보",icon:"📋",short:"기본"},
  {key:"penalty",label:"무신고/과소신고",icon:"📉",short:"신고"},
  {key:"late",label:"납부지연",icon:"⏰",short:"지연"},
  {key:"zero",label:"영세율",icon:"🌐",short:"영세율"},
  {key:"unreg",label:"미등록",icon:"📝",short:"미등록"},
  {key:"inv",label:"세금계산서",icon:"🧾",short:"계산서"},
  {key:"reduce",label:"감면",icon:"💡",short:"감면"},
  {key:"summary",label:"요약·출력",icon:"📊",short:"요약"},
];

/* ═══ MAIN APP ═══ */
function App() {
  const [tab, setTab] = useState("info");
  const [theme, setTheme] = useState("green");
  const t = THEMES[theme];
  const topRef = useRef(null);
  useEffect(()=>{topRef.current?.scrollIntoView({behavior:"smooth"});},[tab]);

  /* ── 기본정보 ── */
  const [taxYear, setTaxYear] = useState("2025");
  const [taxPeriod, setTaxPeriod] = useState("2c");
  const [filingType, setFilingType] = useState("amended");
  const [correctionDate, setCorrectionDate] = useState(""); // 수정신고일 또는 기한후신고일
  const [actualPaymentDate, setActualPaymentDate] = useState("");

  const legalDeadline = useMemo(()=>{
    const p = PERIODS.find(x=>x.key===taxPeriod);
    return p ? p.dl(taxYear) : "";
  },[taxYear, taxPeriod]);

  // 감면 경과일수: 법정신고기한 ~ 수정(기한후)신고일
  const reductionDays = useMemo(()=>daysBetween(legalDeadline, correctionDate),[legalDeadline, correctionDate]);
  const paymentDays = useMemo(()=>daysBetween(legalDeadline, actualPaymentDate),[legalDeadline, actualPaymentDate]);

  // 감면율 자동 산출
  const amendedRedRate = filingType==="amended" ? getAmendedReduction(reductionDays) : 0;
  const lateRedRate = filingType==="late" ? getLateFilingReduction(reductionDays) : 0;
  const activeRedRate = filingType==="amended" ? amendedRedRate : lateRedRate;
  const reductionAvailable = activeRedRate > 0;

  /* ── 무신고/과소신고 (통합) ── */
  const [penaltyType, setPenaltyType] = useState("nofile"); // nofile | under
  const [noFilingTax, setNoFilingTax] = useState(0);
  const [noFilingFraud, setNoFilingFraud] = useState("general");
  const [assessedTax, setAssessedTax] = useState(0);
  const [reportedTax, setReportedTax] = useState(0);
  const [underFraud, setUnderFraud] = useState("general");

  const noFilingRate = noFilingFraud==="general"?20:noFilingFraud==="fraud"?40:60;
  const noFilingPenalty = Math.floor(noFilingTax * noFilingRate / 100);
  const underTax = Math.max(0, assessedTax - reportedTax);
  const underRate = underFraud==="general"?10:underFraud==="fraud"?40:60;
  const underPenalty = Math.floor(underTax * underRate / 100);

  // 현재 선택된 신고 가산세
  const currentPenaltyAmount = penaltyType==="nofile" ? noFilingPenalty : underPenalty;
  const currentTaxBase = penaltyType==="nofile" ? noFilingTax : underTax;

  /* ── 납부지연 (자동연동) ── */
  const [unpaidTax, setUnpaidTax] = useState(0);
  const [unpaidAutoSync, setUnpaidAutoSync] = useState(true);
  useEffect(()=>{
    if(unpaidAutoSync) setUnpaidTax(currentTaxBase);
  },[unpaidAutoSync, currentTaxBase]);
  const handleUnpaidChange = (v) => { setUnpaidAutoSync(false); setUnpaidTax(v); };
  const resetAutoSync = () => { setUnpaidAutoSync(true); };
  const latePenalty = Math.floor(unpaidTax * paymentDays * 0.00022);

  /* ── 영세율 ── */
  const [zeroBase, setZeroBase] = useState(0);
  const [zeroReported, setZeroReported] = useState(0);
  const zeroUnreported = Math.max(0, zeroBase - zeroReported);
  const zeroPenalty = Math.floor(zeroUnreported * 0.005);

  /* ── 미등록 ── */
  const [unregSupply, setUnregSupply] = useState(0);
  const unregPenalty = Math.floor(unregSupply * 0.01);

  /* ── 세금계산서 ── */
  const [invItems, setInvItems] = useState([{id:1, type:"notIssued", amount:0}]);
  const [nextInvId, setNextInvId] = useState(2);
  const invCalc = invItems.map(item=>{
    const def = INV_TYPES.find(x=>x.key===item.type);
    return {...item, rate:def?.rate||0, penalty:Math.floor(item.amount*(def?.rate||0)/100), label:def?.label||""};
  });
  const totalInvPenalty = invCalc.reduce((s,i)=>s+i.penalty,0);
  const addInv=()=>{setInvItems([...invItems,{id:nextInvId,type:"notIssued",amount:0}]);setNextInvId(nextInvId+1);};
  const delInv=(id)=>setInvItems(invItems.filter(i=>i.id!==id));
  const updInv=(id,f,v)=>setInvItems(invItems.map(i=>i.id===id?{...i,[f]:v}:i));

  /* ── 감면 계산 ── */
  const penaltyReduction = penaltyType==="nofile"
    ? (filingType==="late" ? Math.floor(noFilingPenalty * lateRedRate / 100) : 0)
    : (filingType==="amended" ? Math.floor(underPenalty * amendedRedRate / 100) : 0);

  /* ── 합계 ── */
  const penaltyLabel = penaltyType==="nofile" ? "무신고가산세" : "과소신고가산세";
  const penaltyBefore = penaltyType==="nofile" ? noFilingPenalty : underPenalty;
  const penalties = [
    {name:penaltyLabel, before:penaltyBefore, reduction:penaltyReduction, after:penaltyBefore-penaltyReduction},
    {name:"납부지연가산세", before:latePenalty, reduction:0, after:latePenalty},
    {name:"영세율 신고불성실", before:zeroPenalty, reduction:0, after:zeroPenalty},
    {name:"사업자 미등록", before:unregPenalty, reduction:0, after:unregPenalty},
    {name:"세금계산서 관련", before:totalInvPenalty, reduction:0, after:totalInvPenalty},
  ];
  const totalBefore = penalties.reduce((s,p)=>s+p.before,0);
  const totalReduction = penalties.reduce((s,p)=>s+p.reduction,0);
  const totalAfter = penalties.reduce((s,p)=>s+p.after,0);

  /* ═══ 엑셀 출력 (수식 연결 + 스타일) ═══ */
  const exportExcel = () => {
    const pInfo = PERIODS.find(x=>x.key===taxPeriod);
    const wb = XLSX.utils.book_new();
    const ws = {};

    // 스타일 정의
    const BLUE = "1565C0";
    const LBLUE = "E3F2FD";
    const WHITE = "FFFFFF";
    const DARK = "212121";
    const thinBorder = {style:"thin",color:{rgb:"B0BEC5"}};
    const borders = {top:thinBorder,bottom:thinBorder,left:thinBorder,right:thinBorder};

    const sTitle = {font:{bold:true,sz:16,color:{rgb:WHITE}},fill:{fgColor:{rgb:BLUE}},alignment:{horizontal:"center",vertical:"center"}};
    const sHeader = {font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:BLUE}},alignment:{horizontal:"center",vertical:"center"},border:borders};
    const sLabelBg = {font:{bold:true,sz:10,color:{rgb:DARK}},fill:{fgColor:{rgb:LBLUE}},alignment:{horizontal:"left",vertical:"center"},border:borders};
    const sLabel = {font:{bold:true,sz:10,color:{rgb:DARK}},alignment:{horizontal:"left",vertical:"center"},border:borders};
    const sVal = {font:{sz:10,color:{rgb:DARK}},alignment:{horizontal:"right",vertical:"center"},numFmt:"#,##0",border:borders};
    const sValC = {font:{sz:10,color:{rgb:DARK}},alignment:{horizontal:"center",vertical:"center"},border:borders};
    const sPct = {font:{sz:10,color:{rgb:DARK}},alignment:{horizontal:"center",vertical:"center"},numFmt:"0%",border:borders};
    const sTotalLabel = {font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:BLUE}},alignment:{horizontal:"center",vertical:"center"},border:borders};
    const sTotalVal = {font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:BLUE}},alignment:{horizontal:"right",vertical:"center"},numFmt:"#,##0",border:borders};
    const sTotalPct = {font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:BLUE}},alignment:{horizontal:"center",vertical:"center"},numFmt:"0%",border:borders};
    const sSection = {font:{bold:true,sz:10,color:{rgb:BLUE}},alignment:{horizontal:"left"}};
    const sEmpty = {};

    const sc = (ref,v,s,type) => { ws[ref]={v:v,s:s||sEmpty}; if(type) ws[ref].t=type; };
    const sf = (ref,formula,s) => { ws[ref]={f:formula,s:s||sVal,t:'n'}; };

    // Row 1: 타이틀
    sc("A1","부가가치세 가산세 계산서",sTitle,"s");
    ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:4}}];

    // Row 3-6: 기본정보
    sc("A3","과세기간",sLabelBg,"s"); sc("B3",pInfo?.label||"",sValC,"s"); sc("D3","귀속연도",sLabelBg,"s"); sc("E3",taxYear,sValC,"s");
    sc("A4","법정신고기한",sLabelBg,"s"); sc("B4",fmtDate(legalDeadline),sValC,"s"); sc("D4","신고유형",sLabelBg,"s"); sc("E4",filingType==="regular"?"정기신고":filingType==="amended"?"수정신고":"기한후신고",sValC,"s");
    const corrLabel = filingType==="amended"?"수정신고일":"기한후신고일";
    sc("A5",corrLabel,sLabelBg,"s"); sc("B5",fmtDate(correctionDate),sValC,"s"); sc("D5","실제 납부일",sLabelBg,"s"); sc("E5",fmtDate(actualPaymentDate),sValC,"s");
    sc("A6","감면 경과일수",sLabelBg,"s"); sc("B6",reductionDays+"일",sValC,"s"); sc("D6","적용 감면율",sLabelBg,"s"); sc("E6",activeRedRate+"%",sValC,"s");

    // Row 8: 헤더
    sc("A8","가산세 종류",sHeader,"s"); sc("B8","산출 가산세",sHeader,"s"); sc("C8","감면율",sHeader,"s"); sc("D8","감면액",sHeader,"s"); sc("E8","납부할 가산세",sHeader,"s");

    // Row 9-13: 데이터 (수식 연결)
    const rows = [
      {r:9, name:penaltyLabel, val:penaltyBefore, redRate:activeRedRate/100},
      {r:10, name:"납부지연가산세", val:latePenalty, redRate:0},
      {r:11, name:"영세율 신고불성실", val:zeroPenalty, redRate:0},
      {r:12, name:"사업자 미등록", val:unregPenalty, redRate:0},
      {r:13, name:"세금계산서 관련", val:totalInvPenalty, redRate:0},
    ];
    rows.forEach(({r,name,val,redRate})=>{
      sc("A"+r, name, sLabel, "s");
      sc("B"+r, val, sVal, "n");
      sc("C"+r, redRate, sPct, "n");
      sf("D"+r, `ROUND(B${r}*C${r},0)`, sVal);
      sf("E"+r, `B${r}-D${r}`, sVal);
    });

    // Row 15: 합계 (SUM 수식)
    sc("A15","합  계",sTotalLabel,"s");
    sf("B15","SUM(B9:B13)",sTotalVal);
    sc("C15","",sTotalPct,"s");
    sf("D15","SUM(D9:D13)",sTotalVal);
    sf("E15","SUM(E9:E13)",sTotalVal);

    // Row 17+: 상세 내역
    let row = 17;
    // 무신고/과소신고 상세
    sc("A"+row, `[${penaltyLabel} 상세]`, sSection, "s"); row++;
    if(penaltyType==="nofile"){
      sc("A"+row,"무신고 납부세액",sLabelBg,"s"); sc("B"+row,noFilingTax,sVal,"n");
      sc("D"+row,"가산세율",sLabelBg,"s"); sc("E"+row,noFilingRate+"%",sValC,"s"); row++;
      sc("A"+row,"가산세액",sLabelBg,"s"); sf("B"+row,`B${row-1}*${noFilingRate}/100`,sVal); row++;
    } else {
      sc("A"+row,"산출세액(결정세액)",sLabelBg,"s"); sc("B"+row,assessedTax,sVal,"n");
      sc("D"+row,"기신고 납부세액",sLabelBg,"s"); sc("E"+row,reportedTax,sVal,"n"); row++;
      sc("A"+row,"과소신고 납부세액",sLabelBg,"s"); sf("B"+row,`B${row-1}-E${row-1}`,sVal);
      sc("D"+row,"가산세율",sLabelBg,"s"); sc("E"+row,underRate+"%",sValC,"s"); row++;
      sc("A"+row,"가산세액",sLabelBg,"s"); sf("B"+row,`B${row-1}*${underRate}/100`,sVal); row++;
    }
    row++;

    // 납부지연 상세
    if(latePenalty>0){
      sc("A"+row,"[납부지연가산세 상세]",sSection,"s"); row++;
      sc("A"+row,"미납세액",sLabelBg,"s"); sc("B"+row,unpaidTax,sVal,"n");
      sc("D"+row,"경과일수",sLabelBg,"s"); sc("E"+row,paymentDays,sVal,"n"); row++;
      sc("A"+row,"일일이율",sLabelBg,"s"); sc("B"+row,"0.022%",sValC,"s");
      sc("D"+row,"가산세액",sLabelBg,"s"); sf("E"+row,`ROUND(B${row-1}*E${row-1}*0.00022,0)`,sVal); row++;
      row++;
    }

    // 영세율 상세
    if(zeroPenalty>0){
      sc("A"+row,"[영세율 과세표준 신고불성실 상세]",sSection,"s"); row++;
      sc("A"+row,"영세율 과세표준",sLabelBg,"s"); sc("B"+row,zeroBase,sVal,"n");
      sc("D"+row,"신고 과세표준",sLabelBg,"s"); sc("E"+row,zeroReported,sVal,"n"); row++;
      sc("A"+row,"미신고 과세표준",sLabelBg,"s"); sf("B"+row,`B${row-1}-E${row-1}`,sVal);
      sc("D"+row,"가산세(×0.5%)",sLabelBg,"s"); sf("E"+row,`ROUND(B${row}*0.005,0)`,sVal); row++;
      row++;
    }

    // 미등록 상세
    if(unregPenalty>0){
      sc("A"+row,"[사업자 미등록 가산세 상세]",sSection,"s"); row++;
      sc("A"+row,"공급가액",sLabelBg,"s"); sc("B"+row,unregSupply,sVal,"n");
      sc("D"+row,"가산세(×1%)",sLabelBg,"s"); sf("E"+row,`ROUND(B${row}*0.01,0)`,sVal); row++;
      row++;
    }

    // 세금계산서 상세
    if(totalInvPenalty>0){
      sc("A"+row,"[세금계산서 관련 가산세 상세]",sSection,"s"); row++;
      sc("A"+row,"위반유형",sHeader,"s"); sc("B"+row,"공급가액",sHeader,"s"); sc("C"+row,"가산세율",sHeader,"s"); sc("D"+row,"사유",sHeader,"s"); sc("E"+row,"가산세액",sHeader,"s"); row++;
      invCalc.filter(i=>i.penalty>0).forEach(i=>{
        const def=INV_TYPES.find(x=>x.key===i.type);
        sc("A"+row,def?.label||"",sLabel,"s");
        sc("B"+row,i.amount,sVal,"n");
        sc("C"+row,i.rate/100,sPct,"n");
        sc("D"+row,def?.desc||"",{font:{sz:9,color:{rgb:"616161"}},alignment:{horizontal:"left",wrapText:true},border:borders},"s");
        sf("E"+row,`ROUND(B${row}*C${row},0)`,sVal);
        row++;
      });
    }

    // 시트 설정
    ws["!ref"] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:row,c:4}});
    ws["!cols"] = [{wch:22},{wch:18},{wch:12},{wch:18},{wch:18}];
    ws["!rows"] = [{hpt:30}]; // 타이틀 행 높이
    // 눈금선 숨기기
    ws["!sheetViews"] = [{showGridLines:false}];

    XLSX.utils.book_append_sheet(wb, ws, "가산세계산서");
    XLSX.writeFile(wb, `부가세_가산세_${taxYear}_${taxPeriod}.xlsx`);
  };

  /* ── Navigation ── */
  const tabKeys = TABS.map(x=>x.key);
  const goNext=()=>{const i=tabKeys.indexOf(tab);if(i<tabKeys.length-1)setTab(tabKeys[i+1]);};
  const goPrev=()=>{const i=tabKeys.indexOf(tab);if(i>0)setTab(tabKeys[i-1]);};

  /* ── Styles ── */
  const card={background:t.cardBg,borderRadius:14,border:"1.5px solid "+t.cardBdr,marginBottom:16,overflow:"hidden"};
  const cardH={padding:"13px 16px",borderBottom:"1.5px solid "+t.cardBdr,fontWeight:700,fontSize:15,background:t.cardHBg,display:"flex",justifyContent:"space-between",alignItems:"center"};
  const cardB={padding:"16px"};
  const rw={display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+t.rowBdr};
  const btnGroup=(opts,val,onChange)=>(<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{opts.map(o=>(<button key={o.v} onClick={()=>onChange(o.v)} style={{flex:"1 1 auto",padding:"9px 12px",fontSize:13,fontWeight:val===o.v?600:400,background:val===o.v?t.primary:"#fff",color:val===o.v?"#fff":t.textLight,border:"1.5px solid "+(val===o.v?t.primary:t.cardBdr),borderRadius:8,cursor:"pointer"}}>{o.l}</button>))}</div>);

  const navBtns = (
    <div className="nav-area" style={{display:"flex",gap:10,marginTop:12,marginBottom:20}}>
      {tabKeys.indexOf(tab)>0&&<button className="nav-btn" style={{flex:1,background:t.navSecBg,color:t.navSecTxt}} onClick={goPrev}>← 이전</button>}
      {tabKeys.indexOf(tab)<tabKeys.length-1&&<button className="nav-btn" style={{flex:1,background:t.primaryGrad,color:"#fff"}} onClick={goNext}>{t.showKitty?"🎀 ":""}다음 →</button>}
    </div>
  );

  return (
    <div className="app-shell" style={{background:t.bg,minHeight:"100vh",fontSize:14,lineHeight:1.6,color:t.text}}>
      <div ref={topRef}></div>
      {/* Header */}
      <div className="app-header" style={{background:t.primaryGrad,color:"#fff",padding:"18px 18px 14px",paddingTop:"max(18px, env(safe-area-inset-top))",position:"relative",overflow:"hidden"}}>
        {t.showKitty&&<div className="kitty-deco" style={{position:"absolute",top:6,right:10,opacity:.2}}><KittyFace size={55} color="#fff"/></div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:700,margin:0}}>{t.showKitty?"🎀 ":""}부가가치세 가산세 계산기</h1>
            <div style={{fontSize:11,opacity:.85,marginTop:2}}>국세기본법 §47의2~5 · 부가세법 §60</div>
          </div>
          <div className="theme-sw" style={{display:"flex",gap:4}}>
            {Object.entries(THEMES).map(([k,th])=>(<button key={k} onClick={()=>setTheme(k)} style={{width:28,height:28,borderRadius:14,border:theme===k?"2px solid #fff":"2px solid rgba(255,255,255,.3)",background:theme===k?"rgba(255,255,255,.3)":"transparent",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}} title={th.name}>{th.name.slice(0,2)}</button>))}
          </div>
        </div>
      </div>

      {/* Top tabs */}
      <div className="top-tabs" style={{display:"flex",gap:0,background:t.tabBg,overflowX:"auto"}}>
        {TABS.map(x=>(<button key={x.key} onClick={()=>setTab(x.key)} style={{padding:"9px 14px",fontSize:13,fontWeight:tab===x.key?600:400,color:tab===x.key?t.tabActiveTxt:t.tabInactiveTxt,background:tab===x.key?t.bg:"transparent",border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{x.icon} {x.label}</button>))}
      </div>

      <div className="main-content" style={{padding:16,maxWidth:680,margin:"0 auto"}}>

        {/* ═══ TAB 1: 기본정보 ═══ */}
        {tab==="info"&&(<Fragment>
          <div style={card}><div style={cardH}><span>📋 기본정보</span></div><div style={cardB}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <div className="field">
                <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>귀속연도</label>
                <input type="text" value={taxYear} onChange={e=>setTaxYear(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:16,background:"#fff",outline:"none",textAlign:"center"}}/>
              </div>
              <div className="field">
                <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>과세기간</label>
                <select value={taxPeriod} onChange={e=>setTaxPeriod(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:14,background:"#fff"}}>
                  {PERIODS.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
                </select>
              </div>
            </div>
            <ReadonlyField t={t} label="법정신고기한" value={fmtDate(legalDeadline)} />
            <div className="field">
              <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>신고유형</label>
              {btnGroup([
                {v:"regular",l:"정기신고"},{v:"amended",l:"수정신고"},{v:"late",l:"기한후신고"}
              ], filingType, setFilingType)}
              <div style={{fontSize:11.5,color:t.hint,marginTop:6,paddingLeft:2}}>
                {filingType==="amended"&&"※ 과소신고가산세 감면 대상 (수정신고 제출일 기준 경과기간에 따라 90%~10%)"}
                {filingType==="late"&&"※ 무신고가산세 감면 대상 (기한후신고 제출일 기준 경과기간에 따라 50%~20%)"}
                {filingType==="regular"&&"※ 정기 신고 (감면 해당 없음)"}
              </div>
            </div>
            {filingType!=="regular"&&(
              <div className="field">
                <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>
                  {filingType==="amended"?"수정신고 제출일":"기한후신고 제출일"}
                </label>
                <input type="date" value={correctionDate} onChange={e=>setCorrectionDate(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:14,background:"#fff",outline:"none"}}/>
                <div style={{fontSize:11.5,color:t.hint,marginTop:3,paddingLeft:2}}>※ 감면 경과일수 산정 기준일</div>
              </div>
            )}
            <div className="field">
              <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>실제 납부일</label>
              <input type="date" value={actualPaymentDate} onChange={e=>setActualPaymentDate(e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid "+t.inputBdr,borderRadius:10,fontSize:14,background:"#fff",outline:"none"}}/>
              <div style={{fontSize:11.5,color:t.hint,marginTop:3,paddingLeft:2}}>※ 납부지연가산세 경과일수 산정 기준일</div>
            </div>

            {/* 자동 산출 결과 */}
            <div style={{padding:"14px",background:t.summaryBg,borderRadius:10,border:"1px solid "+t.summaryBdr,marginTop:4}}>
              {filingType!=="regular"&&reductionDays>0&&(
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:13,color:t.accent}}>감면 경과일수: <strong>{reductionDays}일</strong> (법정신고기한 → {filingType==="amended"?"수정":"기한후"}신고일)</div>
                  <div style={{fontSize:15,fontWeight:700,color:reductionAvailable?t.resultGood:t.resultWarn,marginTop:4}}>
                    {reductionAvailable ? `감면율 ${activeRedRate}% 적용 가능` : "감면 기간 초과 (감면 불가)"}
                  </div>
                </div>
              )}
              {filingType!=="regular"&&!correctionDate&&(
                <div style={{fontSize:13,color:t.warnTxt}}>{filingType==="amended"?"수정신고":"기한후신고"} 제출일을 입력하면 감면율이 자동 산출됩니다</div>
              )}
              {paymentDays>0&&<div style={{fontSize:13,color:t.accent}}>납부지연 경과일수: <strong>{paymentDays}일</strong> (법정신고기한 → 납부일)</div>}
              {filingType==="regular"&&<div style={{fontSize:13,color:t.textLight}}>정기신고 — 수정신고·기한후신고 감면 해당 없음</div>}
            </div>
          </div></div>
          {navBtns}
        </Fragment>)}

        {/* ═══ TAB 2: 무신고/과소신고 (통합) ═══ */}
        {tab==="penalty"&&(<Fragment>
          <div style={card}><div style={cardH}><span>📉 {penaltyType==="nofile"?"무신고":"과소신고"}가산세</span><span style={{fontSize:12,color:t.textLight}}>{penaltyType==="nofile"?"국기법 §47의2":"국기법 §47의3"}</span></div><div style={cardB}>
            {/* 유형 선택 */}
            <div className="field">
              <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>가산세 유형 선택</label>
              {btnGroup([
                {v:"nofile",l:"무신고가산세"},{v:"under",l:"과소신고가산세"}
              ], penaltyType, setPenaltyType)}
            </div>

            {/* 무신고 */}
            {penaltyType==="nofile"&&(<Fragment>
              <FormulaBox t={t}
                lines={[
                  "무신고가산세 = 무신고 납부세액 × 가산세율",
                  `= ${fmt(noFilingTax)} × ${noFilingRate}%`,
                ]}
                result={noFilingPenalty}
              />
              <div className="field">
                <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>부정행위 유형</label>
                {btnGroup([
                  {v:"general",l:"일반 (20%)"},{v:"fraud",l:"부정 (40%)"},{v:"intl",l:"국제거래 부정 (60%)"}
                ], noFilingFraud, setNoFilingFraud)}
              </div>
              <NumberInput t={t} label="무신고 납부세액" value={noFilingTax} onChange={setNoFilingTax} hint="※ 납부하였어야 할 세액 (산출세액 - 기납부세액)" />
              <ReadonlyField t={t} label="무신고가산세" value={noFilingPenalty} sub={`${fmt(noFilingTax)} × ${noFilingRate}% = ${fmt(noFilingPenalty)}`} />
            </Fragment>)}

            {/* 과소신고 */}
            {penaltyType==="under"&&(<Fragment>
              <FormulaBox t={t}
                lines={[
                  "과소신고가산세 = (산출세액 - 기신고세액) × 가산세율",
                  `= (${fmt(assessedTax)} - ${fmt(reportedTax)}) × ${underRate}%`,
                  `= ${fmt(underTax)} × ${underRate}%`,
                ]}
                result={underPenalty}
              />
              <div className="field">
                <label style={{fontSize:13,color:t.textLight,marginBottom:5,display:"block"}}>부정행위 유형</label>
                {btnGroup([
                  {v:"general",l:"일반 (10%)"},{v:"fraud",l:"부정 (40%)"},{v:"intl",l:"국제거래 부정 (60%)"}
                ], underFraud, setUnderFraud)}
              </div>
              <NumberInput t={t} label="산출세액 (결정세액)" value={assessedTax} onChange={setAssessedTax} hint="※ 정상적으로 신고했어야 할 세액" />
              <NumberInput t={t} label="기신고 납부세액" value={reportedTax} onChange={setReportedTax} hint="※ 이미 신고·납부한 세액" />
              <ReadonlyField t={t} label="과소신고 납부세액" value={underTax} sub={`${fmt(assessedTax)} - ${fmt(reportedTax)} = ${fmt(underTax)}`} />

                      <td style={{padding:"8px",borderBottom:"1px solid "+t.rowBdr,textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(p.before)}</td>
                      <td style={{padding:"8px",borderBottom:"1px solid "+t.rowBdr,textAlign:"right",fontVariantNumeric:"tabular-nums",color:p.reduction>0?t.resultGood:t.textLight}}>{p.reduction>0?"-"+fmt(p.reduction):"-"}</td>
                      <td style={{padding:"8px",borderBottom:"1px solid "+t.rowBdr,textAlign:"right",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{fmt(p.after)}</td>
                    </tr>
                  ))}
                  <tr style={{fontWeight:700,background:t.summaryBg}}>
                    <td style={{padding:"10px 8px",borderTop:"2px solid "+t.cardBdr}}>합계</td>
                    <td style={{padding:"10px 8px",borderTop:"2px solid "+t.cardBdr,textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(totalBefore)}</td>
                    <td style={{padding:"10px 8px",borderTop:"2px solid "+t.cardBdr,textAlign:"right",fontVariantNumeric:"tabular-nums",color:totalReduction>0?t.resultGood:t.textLight}}>{totalReduction>0?"-"+fmt(totalReduction):"-"}</td>
                    <td style={{padding:"10px 8px",borderTop:"2px solid "+t.cardBdr,textAlign:"right",fontSize:16,fontVariantNumeric:"tabular-nums",color:t.accent}}>{fmt(totalAfter)}</td>
                  </tr>
                </tbody>
              </table>
            </div>

            {/* 최종 납부 가산세 */}
            <div style={{marginTop:16,padding:"16px",background:totalAfter>0?t.accentLight:t.okBg,borderRadius:12,border:"1.5px solid "+(totalAfter>0?t.cardBdr:t.okBdr),textAlign:"center"}}>
              <div style={{fontSize:13,color:t.textLight,marginBottom:6}}>최종 납부할 가산세 합계</div>
              <div style={{fontSize:28,fontWeight:700,color:totalAfter>0?t.resultBad:t.resultGood,fontVariantNumeric:"tabular-nums"}}>{fmt(totalAfter)}원</div>
              {totalReduction>0&&<div style={{fontSize:12,color:t.resultGood,marginTop:4}}>감면 적용: -{fmt(totalReduction)}원</div>}
            </div>

            {/* 상세 수식 */}
            {penalties.filter(p=>p.before>0).length>0&&(<div style={{marginTop:16}}>
              <div style={{fontSize:14,fontWeight:600,color:t.text,marginBottom:8}}>상세 수식</div>
              {penaltyBefore>0&&<div style={{...rw,fontSize:13}}>
                <span>{penaltyLabel}: {penaltyType==="nofile"?`${fmt(noFilingTax)} × ${noFilingRate}%`:`${fmt(underTax)} × ${underRate}%`}</span>
                <span>{fmt(penaltyBefore)}{penaltyReduction>0&&<span style={{color:t.resultGood}}> (-{fmt(penaltyReduction)})</span>}</span>
              </div>}
              {latePenalty>0&&<div style={{...rw,fontSize:13}}><span>납부지연: {fmt(unpaidTax)} × {paymentDays}일 × 0.022%</span><span>{fmt(latePenalty)}</span></div>}
              {zeroPenalty>0&&<div style={{...rw,fontSize:13}}><span>영세율: {fmt(zeroUnreported)} × 0.5%</span><span>{fmt(zeroPenalty)}</span></div>}
              {unregPenalty>0&&<div style={{...rw,fontSize:13}}><span>미등록: {fmt(unregSupply)} × 1%</span><span>{fmt(unregPenalty)}</span></div>}
              {totalInvPenalty>0&&<div style={{...rw,fontSize:13}}><span>세금계산서 ({invCalc.filter(i=>i.penalty>0).length}건)</span><span>{fmt(totalInvPenalty)}</span></div>}
            </div>)}

            {/* 엑셀 출력 */}
            <button onClick={exportExcel} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",padding:"14px",marginTop:20,background:t.primaryGrad,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:600,cursor:"pointer"}}>
              📥 엑셀 다운로드 (.xlsx)
            </button>
            <div style={{fontSize:11,color:t.textLight,textAlign:"center",marginTop:6}}>※ 엑셀 파일은 수식으로 연결되어 있어 값 수정 시 자동 재계산됩니다</div>
          </div></div>

          <div className="nav-area" style={{marginTop:8,marginBottom:20}}>
            <button className="nav-btn" style={{background:t.navSecBg,color:t.navSecTxt}} onClick={goPrev}>← 이전</button>
          </div>
          {t.showKitty&&<div className="kitty-deco" style={{textAlign:"center",opacity:.12,marginBottom:20}}><KittyFace size={50} color={t.primary}/></div>}
        </Fragment>)}
      </div>

      {/* Bottom tabs */}
      <div className="bottom-tabs" style={{background:t.bottomTabBg,borderTop:"1.5px solid "+t.bottomTabBdr}}>
        {TABS.map(x=>(<button key={x.key} onClick={()=>setTab(x.key)} style={{color:tab===x.key?t.bottomTabActive:t.bottomTabInactive,fontWeight:tab===x.key?700:400}}><span className="tab-icon">{x.icon}</span>{x.short}</button>))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
